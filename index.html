<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Things on the axis | 졸업전시회</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
    <nav>
        <div class="nav-links">
            <a href="#" onclick="showPage('main')">MAIN</a>
            <a href="#" onclick="showPage('works')">WORKS</a>
            <a href="#" onclick="showPage('booth')">BOOTH</a>
            <a href="#" onclick="showPage('guestbook')">GUESTBOOK</a>
        </div>
    </nav>

    <div id="page-main" class="page active">
        <section class="hero">
            <h1>Things on the axis</h1>
            <p>2026 Visual Design Graduation Exhibition</p>
        </section>
        <div id="designer-grid" class="grid-container"></div>
    </div>

    <div id="page-works" class="page">
        <div class="filter-bar">
            <button onclick="renderWorks('all')">ALL</button>
            <button onclick="renderWorks('Graphic')">GRAPHIC</button>
            <button onclick="renderWorks('Media')">MEDIA</button>
            <button onclick="renderWorks('Product')">PRODUCT</button>
        </div>
        <div id="works-list" class="works-container"></div>
    </div>

    <div id="page-booth" class="page">
        <div id="booth-map" class="booth-container"></div>
    </div>

    <div id="page-guestbook" class="page">
        <div id="guestbook-list" class="msg-container"></div>
    </div>

    <script src="main.js"></script>
</body>
</html>
